name: Coin2Coins

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Build
        run: |
          set -e

          flutter create --org com.fluxen --project-name fluxen_currency --platforms android /tmp/app
          rm -rf /tmp/app/lib
          cp -r fluxen-final/flutter/lib /tmp/app/lib
          cp fluxen-final/flutter/pubspec.yaml /tmp/app/pubspec.yaml

          pip install Pillow -q

          # Write manifest WITHOUT applicationName placeholder first
          python3 << 'PYEOF'
          manifest = """<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:label="Fluxen"
                  android:name="APPNAME_PLACEHOLDER"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>"""
          with open('/tmp/app/android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(manifest)
          print("Manifest written with placeholder")
          PYEOF

          # Now use sed to replace placeholder with actual Flutter variable
          sed -i 's/APPNAME_PLACEHOLDER/$\{applicationName\}/g' /tmp/app/android/app/src/main/AndroidManifest.xml

          echo "=== Final Manifest ==="
          cat /tmp/app/android/app/src/main/AndroidManifest.xml

          # Write icons
          python3 << PYEOF2
          import base64, os, io, shutil
          from PIL import Image
          icon_data = base64.b64decode('')
          img = Image.open(io.BytesIO(icon_data)).convert('RGBA')
          res = '/tmp/app/android/app/src/main/res'
          for folder in ['mipmap-mdpi','mipmap-hdpi','mipmap-xhdpi','mipmap-xxhdpi','mipmap-xxxhdpi',
                         'mipmap-mdpi-v26','mipmap-hdpi-v26','mipmap-xhdpi-v26','mipmap-xxhdpi-v26','mipmap-xxxhdpi-v26']:
              path = f'{res}/{folder}'
              if os.path.exists(path): shutil.rmtree(path)
              os.makedirs(path)
          for folder, s in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),
              ('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192),('mipmap-mdpi-v26',48),
              ('mipmap-hdpi-v26',72),('mipmap-xhdpi-v26',96),('mipmap-xxhdpi-v26',144),('mipmap-xxxhdpi-v26',192)]:
              resized = img.resize((s,s), Image.LANCZOS)
              resized.save(f'{res}/{folder}/ic_launcher.png')
              resized.save(f'{res}/{folder}/ic_launcher_round.png')
              resized.save(f'{res}/{folder}/ic_launcher_foreground.png')
          print('All icons written!')
          PYEOF2

          cd /tmp/app
          flutter pub get
          flutter build apk --release --target-platform android-arm64
          echo "BUILD SUCCESS"
          ls -lh build/app/outputs/flutter-apk/

      - uses: actions/upload-artifact@v4
        with:
          name: Fluxen-APK
          path: /tmp/app/build/app/outputs/flutter-apk/app-release.apk

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: fluxen-final/web
          publish_branch: gh-pages
